<!DOCTYPE html>
<html>

<head>
    <title>Customer Capture Form</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Customer Capture Form</h1>

    <form action="/add" method="POST">

        <label>First Name</label>
        <input type="text"
               name="first_name"
               required>

        <label>Last Name</label>
        <input type="text"
               name="last_name"
               required>

        <label>Email</label>
        <input type="email"
               name="email"
               required>

        <label>Phone Number</label>
        <input type="text"
               name="phone"
               required>

        <button type="submit">
            Save Customer
        </button>

    </form>

    <hr>

    <h2>Customer List</h2>

    <table>

        <tr>
            <th>ID</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Phone</th>
        </tr>

        {% for customer in customers %}
        <tr>
            <td>{{ customer[0] }}</td>
            <td>{{ customer[1] }}</td>
            <td>{{ customer[2] }}</td>
            <td>{{ customer[3] }}</td>
            <td>{{ customer[4] }}</td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>

</html>
